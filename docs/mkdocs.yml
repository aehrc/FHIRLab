# FHIRLab Core Documentation
# ==========================
# Built with MkDocs and Material theme
# https://squidfunk.github.io/mkdocs-material/

site_name: FHIRLab Core
site_description: A minimal, Docker-based FHIR learning environment for healthcare teams
site_url: https://fhirlab.github.io/core/
repo_url: https://github.com/fhirlab/core
repo_name: fhirlab/core

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/favicon.svg

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - User Guide:
      - Starting & Stopping: guide/lifecycle.md
      - Loading Data: guide/data-loading.md
      - Using the API: guide/api-usage.md
      - SNOMED CT Browser: guide/snomed-browser.md
  - Reference:
      - Configuration: reference/configuration.md
      - Scripts: reference/scripts.md
      - Postman Collection: reference/postman.md
  - Troubleshooting: troubleshooting.md
  - Resources:
      - Upstream Projects: resources/upstream.md
      - Learning Resources: resources/learning.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fhirlab/core
  generator: false
