# GitLab CI/CD Pipeline for FHIRLab Core Documentation
# ======================================================
# Builds the MkDocs documentation and publishes it to GitLab Pages.

stages:
  - build
  - deploy

build-docs:
  stage: build
  image: python:3.11
  script:
    - pip install mkdocs mkdocs-material mkdocs-minify-plugin
    - cd docs
    - mkdocs build
  artifacts:
    paths:
      - docs/site
    expire_in: 30 days
  rules:
    - when: always

pages:
  stage: deploy
  image: busybox
  needs:
    - build-docs
  variables:
    GIT_STRATEGY: none
  script:
    - cp -r docs/site public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
