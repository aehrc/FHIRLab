# FHIRLab Core - Docker Compose Configuration
# ===========================================
# A minimal, learning-focused deployment for teams with limited DevOps skills.
#
# Upstream References:
# - HAPI FHIR: https://gitlab.com/australian-e-health-research-centre/akkadakka
#            https://github.com/hapifhir/hapi-fhir-jpaserver-starter
# - Snowstorm: https://github.com/IHTSDO/snowstorm-x/blob/master/docker-compose.yml
#            https://github.com/IHTSDO/snowstorm-x/blob/master/docs/using-docker.md
#
# Usage:
#   Start core services:     docker compose up -d
#   Start with SMART on FHIR: docker compose --profile smart up -d
#   Stop services:           docker compose down
#   Reset all data:          docker compose down -v

services:
  # ==========================================================================
  # HAPI FHIR R4 Server
  # Based on: https://gitlab.com/australian-e-health-research-centre/akkadakka
  #           https://github.com/hapifhir/hapi-fhir-jpaserver-starter
  # ==========================================================================
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: fhirlab-hapi-fhir
    restart: unless-stopped
    ports:
      - "${HAPI_FHIR_PORT:-8080}:8080"
    environment:
      # Server configuration
      - hapi.fhir.server_address=${HAPI_FHIR_SERVER_ADDRESS:-http://localhost:8080/fhir}
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.default_encoding=json
      - hapi.fhir.default_pretty_print=true
      # Database: in-memory H2 (data resets on restart - suitable for learning)
      # For persistent storage, see docs/reference/configuration.md
      - spring.datasource.url=jdbc:h2:mem:hapi;DB_CLOSE_DELAY=-1
      - spring.datasource.driverClassName=org.h2.Driver
      - spring.datasource.username=sa
      - spring.datasource.password=
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect
      # Performance settings for learning environment
      - hapi.fhir.bulk_export_enabled=true
      - hapi.fhir.allow_external_references=true
      - hapi.fhir.allow_multiple_delete=true
    networks:
      - fhirlab
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ==========================================================================
  # Elasticsearch for Snowstorm
  # Based on: https://github.com/IHTSDO/snowstorm-x/blob/master/docker-compose.yml
  # ==========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: fhirlab-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - node.name=snowstorm
      - cluster.name=snowstorm-cluster
      - "ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-2g} -Xmx${ES_HEAP_SIZE:-2g}"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    networks:
      fhirlab:
        aliases:
          - es
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - "${ES_PORT:-127.0.0.1:9200}:9200"
    mem_reservation: ${ES_MEMORY:-2g}

  # ==========================================================================
  # Snowstorm - SNOMED CT Terminology Server
  # Based on: https://github.com/IHTSDO/snowstorm-x/blob/master/docker-compose.yml
  # Documentation: https://github.com/IHTSDO/snowstorm-x/blob/master/docs/using-docker.md
  # Note: Uses Snowstorm to avoid SNOMED licensing issues with other servers
  # ==========================================================================
  snowstorm:
    image: snomedinternational/snowstorm:latest
    container_name: fhirlab-snowstorm
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint: >
      java -Xms${SNOWSTORM_MIN_HEAP:-1g} -Xmx${SNOWSTORM_MAX_HEAP:-2g}
      --add-opens java.base/java.lang=ALL-UNNAMED
      --add-opens=java.base/java.util=ALL-UNNAMED
      -cp @/app/jib-classpath-file
      org.snomed.snowstorm.SnowstormApplication
      --elasticsearch.urls=http://es:9200
    networks:
      fhirlab:
        aliases:
          - snowstorm
    ports:
      - "${SNOWSTORM_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/version"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ==========================================================================
  # SNOMED CT Browser (Optional visual interface for Snowstorm)
  # Based on: https://github.com/IHTSDO/snowstorm-x/blob/master/docker-compose.yml
  # ==========================================================================
  snomed-browser:
    image: snomedinternational/snomedct-browser:latest
    container_name: fhirlab-snomed-browser
    restart: unless-stopped
    depends_on:
      - snowstorm
    environment:
      - API_HOST=http://snowstorm:8080/
    networks:
      - fhirlab
    ports:
      - "${SNOMED_BROWSER_PORT:-8082}:80"

  # ==========================================================================
  # SMART Launcher (Optional - separate service for learning/demonstration)
  # This is a standalone service that connects to HAPI FHIR as an external client.
  # HAPI FHIR requires NO special configuration or "SMART mode" for this to work.
  # Enabled with: docker compose --profile smart up -d
  # ==========================================================================
  smart-launcher:
    image: smartonfhir/smart-launcher:latest
    container_name: fhirlab-smart-launcher
    profiles:
      - smart
    restart: unless-stopped
    depends_on:
      - hapi-fhir
    environment:
      - FHIR_SERVER_R4=${HAPI_FHIR_SERVER_ADDRESS:-http://hapi-fhir:8080/fhir}
      - DISABLE_SANDBOX=false
    networks:
      - fhirlab
    ports:
      - "${SMART_LAUNCHER_PORT:-8083}:80"

  # ==========================================================================
  # FormLab (Optional - comprehensive SMART-on-FHIR demonstration)
  # Based on: https://gitlab.com/australian-e-health-research-centre/form-lab
  # A complete learning environment with SMART launch, forms, and sample data
  # Enabled with: docker compose --profile formlab up -d
  # ==========================================================================
  
  # FormLab Homepage - Documentation and entry point
  formlab-homepage:
    image: registry.gitlab.com/australian-e-health-research-centre/form-lab/homepage
    container_name: fhirlab-formlab-homepage
    profiles:
      - formlab
    restart: unless-stopped
    ports:
      - "${FORMLAB_PORT:-8084}:80"
    depends_on:
      - formlab-launcher-ui
    networks:
      - fhirlab

  # FormLab SMART Launcher UI - Web interface for launching SMART apps
  formlab-launcher-ui:
    image: ghcr.io/aehrc/smart-ehr-launcher/smart-launcher-v2
    container_name: fhirlab-formlab-launcher
    profiles:
      - formlab
    restart: unless-stopped
    ports:
      - "${FORMLAB_LAUNCHER_PORT:-8085}:80"
    environment:
      - VITE_FHIR_SERVER_URL=http://localhost:${FORMLAB_PROXY_PORT:-8086}/v/r4/fhir
    depends_on:
      - formlab-proxy
      - formlab-forms-app
    networks:
      - fhirlab
    configs:
      - source: formlab-ehr-config
        target: /usr/share/nginx/html/config.json

  # FormLab SMART Launch Proxy - Handles SMART authentication
  formlab-proxy:
    image: aehrc/smart-launcher-v2
    container_name: fhirlab-formlab-proxy
    profiles:
      - formlab
    restart: unless-stopped
    ports:
      - "${FORMLAB_PROXY_PORT:-8086}:80"
    environment:
      - FHIR_SERVER_R4=http://formlab-fhir:8080/fhir
    depends_on:
      - formlab-fhir
    networks:
      - fhirlab

  # FormLab SMART Forms Application - SDC forms management
  formlab-forms-app:
    image: ghcr.io/aehrc/smart-forms/smart-forms
    container_name: fhirlab-formlab-forms
    profiles:
      - formlab
    restart: unless-stopped
    ports:
      - "${FORMLAB_FORMS_PORT:-8087}:80"
    depends_on:
      - formlab-fhir
    networks:
      - fhirlab

  # FormLab HAPI FHIR Server - Dedicated FHIR server for FormLab
  formlab-fhir:
    image: hapiproject/hapi:v8.2.0-2
    container_name: fhirlab-formlab-fhir
    profiles:
      - formlab
    restart: unless-stopped
    ports:
      - "${FORMLAB_FHIR_PORT:-8088}:8080"
    depends_on:
      - formlab-db
    networks:
      - fhirlab
    configs:
      - source: formlab-hapi-config
        target: /app/config/application.yaml

  # FormLab PostgreSQL Database - Persistent storage
  formlab-db:
    image: postgres:17
    container_name: fhirlab-formlab-db
    profiles:
      - formlab
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${FORMLAB_DB_PASSWORD:-admin}
      - POSTGRES_USER=${FORMLAB_DB_USER:-admin}
      - POSTGRES_DB=${FORMLAB_DB_NAME:-hapi}
    volumes:
      - formlab-db-data:/var/lib/postgresql/data
    networks:
      - fhirlab

  # FormLab Sample Data Loader - Initializes FHIR server with examples
  formlab-samples:
    image: registry.gitlab.com/australian-e-health-research-centre/form-lab/add-samples
    container_name: fhirlab-formlab-samples
    profiles:
      - formlab
    depends_on:
      - formlab-fhir
    networks:
      - fhirlab

  # ==========================================================================
  # FHIR IG Validator (Optional - multi-arch, supports amd64 + arm64)
  # Based on: https://github.com/hapifhir/org.hl7.fhir.validator-wrapper
  # Enabled with: docker compose --profile validator up -d
  # To add custom IGs, see docs/validator.md
  # ==========================================================================
  fhir-validator:
    build: ./validator
    container_name: fhirlab-fhir-validator
    profiles:
      - validator
    restart: unless-stopped
    ports:
      - "${VALIDATOR_PORT:-3500}:3500"
    volumes:
      - validator-packages:/home/ktor/.fhir/packages
    networks:
      - fhirlab
    mem_reservation: ${VALIDATOR_MEMORY:-1g}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3500/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ==========================================================================
# Configuration Files
# ==========================================================================
configs:
  formlab-hapi-config:
    content: |
      spring:
        datasource:
          url: 'jdbc:postgresql://formlab-db:5432/${FORMLAB_DB_NAME:-hapi}'
          username: ${FORMLAB_DB_USER:-admin}
          password: ${FORMLAB_DB_PASSWORD:-admin}
          driverClassName: org.postgresql.Driver
        jpa:
          properties:
            hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
            hibernate.search.enabled: false

  formlab-ehr-config:
    content: |
      {
        "fhirServerUrl": "http://localhost:${FORMLAB_PROXY_PORT:-8086}/v/r4/fhir",
        "authRequired": false,
        "launchParamConfigType": "proxy",
        "formsServerUrl": "http://localhost:${FORMLAB_PROXY_PORT:-8086}/v/r4/fhir",
        "appList": [
          {
            "appName": "Local SmartForms",
            "launchUrl": "http://localhost:${FORMLAB_FORMS_PORT:-8087}/launch",
            "clientId": "a57d90e3-5f69-4b92-aa2e-2992180863c1",
            "scope": "launch openid fhirUser online_access patient/AllergyIntolerance.cs patient/Condition.cs patient/Encounter.r patient/Immunization.cs patient/Medication.r patient/MedicationStatement.cs patient/Observation.cs patient/Patient.r patient/QuestionnaireResponse.crus user/Practitioner.r launch/questionnaire?role=http://ns.electronichealth.net.au/smart/role/new",
            "redirectUris": "http://localhost:${FORMLAB_FORMS_PORT:-8087}",
            "isEmbeddedView": false
          }
        ],
        "defaultApp": {
          "appName": "Local SmartForms",
          "launchUrl": "http://localhost:${FORMLAB_FORMS_PORT:-8087}/launch",
          "clientId": "a57d90e3-5f69-4b92-aa2e-2992180863c1",
          "scope": "launch openid fhirUser online_access patient/AllergyIntolerance.cs patient/Condition.cs patient/Encounter.r patient/Immunization.cs patient/Medication.r patient/MedicationStatement.cs patient/Observation.cs patient/Patient.r patient/QuestionnaireResponse.crus user/Practitioner.r launch/questionnaire?role=http://ns.electronichealth.net.au/smart/role/new",
          "redirectUris": "http://localhost:${FORMLAB_FORMS_PORT:-8087}",
          "isEmbeddedView": false
        }
      }

# ==========================================================================
# Networks
# ==========================================================================
networks:
  fhirlab:
    name: fhirlab-network

# ==========================================================================
# Volumes - Named volumes for data persistence
# These persist data between restarts. Use 'docker compose down -v' to remove.
# Note: HAPI FHIR uses in-memory database by default (data resets on restart).
#       See docs for persistent storage configuration.
# ==========================================================================
volumes:
  elastic-data:
    name: fhirlab-elastic-data
  formlab-db-data:
    name: fhirlab-formlab-db-data
  validator-packages:
    name: fhirlab-validator-packages
